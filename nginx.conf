## ══════════════════════════════════════════════════════════
## IPD — Nginx Reverse Proxy multi-applications
## Serveur cible: SRV-SEID (10.1.7.247)
##
## Routing :
##   /              → Page d'accueil (liste des apps)
##   /portail/      → Portail IPD (app:3000)
##   /hoshinflow/   → HoshinFlow (à venir, hoshinflow:3000)
##   /ims/          → IMS (à venir)
##   /dro/          → DRO (à venir)
## ══════════════════════════════════════════════════════════

upstream portail_app {
    server app:3000;
    keepalive 32;
}

# ─── Pour ajouter une app ──────────────────────
# upstream hoshinflow_app {
#     server hoshinflow:3000;
#     keepalive 32;
# }

server {
    listen 80;
    server_name _;

    # ─── Sécurité ──────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Logs ──────────────────────────────────────
    access_log /var/log/nginx/ipd_access.log;
    error_log  /var/log/nginx/ipd_error.log;

    # ─── Limites & compression ─────────────────────
    client_max_body_size 50M;
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # ─── Page d'accueil — liste des apps ───────────
    location = / {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }

    location = /index.html {
        root /usr/share/nginx/html;
    }

    # ─── PORTAIL IPD (/portail) ────────────────────
    location /portail {
        proxy_pass http://portail_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 120s;
    }

    # ─── HOSHINFLOW (à activer quand déployé) ──────
    # location /hoshinflow {
    #     proxy_pass http://hoshinflow_app;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "upgrade";
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_buffering off;
    #     proxy_read_timeout 120s;
    # }

    # ─── Health check ──────────────────────────────
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ─── 404 fallback ──────────────────────────────
    location / {
        return 301 /;
    }
}
